name: Cynergy Bank
kind: company
description: >-
  Cynergy Bank is an FCA- and PRA-authorised UK specialist bank (FCA reference
  575105) serving the blended personal and business banking needs of business
  owners, property entrepreneurs, and family businesses. It was formed in December
  2018 when Cynergy Capital acquired Bank of Cyprus UK for approximately £103m and
  rebranded the business as Cynergy Bank. Although it is not one of the nine
  CMA-mandated banks (CMA9), as a UK ASPSP it complies with PSD2 and the UK Open
  Banking Standard, publishing a dedicated third-party interface for the Open
  Banking Implementation Entity (OBIE) Read/Write APIs — Account & Transaction
  Information (AIS), Payment Initiation (PIS), and Confirmation of Funds (CBPII).
  Access is restricted to FCA- or EEA-regulated Third Party Providers and is
  secured with FAPI-grade OAuth2/OIDC, mutual-TLS client authentication, and PSD2
  strong customer authentication using OBIE/eIDAS certificates, onboarded through
  the bank's Open Banking developer portal.
