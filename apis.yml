- aid: cynergy-bank:cynergy-bank-payment-initiation-api
  name: Cynergy Bank Payment Initiation API (PIS)
  description: >-
    Cynergy Bank's implementation of the OBIE Read/Write Payment Initiation (PISP)
    API, allowing FCA/EEA-regulated Payment Initiation Service Providers to initiate
    domestic and scheduled payments on behalf of customers with their consent.
    FAPI-secured (OAuth2/OIDC, mTLS, PSD2 SCA). The harvested OpenAPI is the shared
    OBIE Read/Write standard the interface conforms to, not a Cynergy-proprietary
    contract.
  humanURL: https://developer.openbanking.cynergybank.co.uk/
  tags:
