  - type: APIReference
    url: https://developer.openbanking.cynergybank.co.uk/
- aid: cynergy-bank:cynergy-bank-confirmation-of-funds-api
  name: Cynergy Bank Confirmation of Funds API (CBPII)
  description: >-
    Cynergy Bank's implementation of the OBIE Read/Write Confirmation of Funds
    (CBPII) API, allowing regulated Card Based Payment Instrument Issuers to confirm
    whether sufficient funds are available on a customer account with the customer's
    consent. FAPI-secured (OAuth2/OIDC, mTLS, PSD2 SCA). The harvested OpenAPI is the
    shared OBIE Read/Write standard the interface conforms to, not a
    Cynergy-proprietary contract.
