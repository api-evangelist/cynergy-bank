apis:
- aid: cynergy-bank:cynergy-bank-account-information-api
  name: Cynergy Bank Account & Transaction Information API (AIS)
  description: >-
    Cynergy Bank's implementation of the OBIE Read/Write Account & Transaction
    Information (AISP) API, allowing FCA/EEA-regulated Account Information Service
    Providers to retrieve customer account, balance, transaction, and product data
    with customer consent. FAPI-secured (OAuth2/OIDC, mTLS, PSD2 SCA). The harvested
    OpenAPI is the shared OBIE Read/Write standard the interface conforms to, not a
    Cynergy-proprietary contract.
  humanURL: https://developer.openbanking.cynergybank.co.uk/
  tags:
  - Account Information
  - AISP
  - Open Banking
  properties:
